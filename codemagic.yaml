workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials   # holds App Store Connect API key vars
        - signing                 # holds certificate + provisioning profile
      vars:
        BUNDLE_ID: com.example.teaGoApp   # ⚠️ change to your real bundle ID
        APP_STORE_APPLE_ID: "1234567890"  # ⚠️ replace with your App Store app ID (from App Store Connect)

    scripts:
      - name: Set up Flutter
        script: |
          flutter pub get

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build Flutter IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

      - name: Verify build
        script: |
          ls -la build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
